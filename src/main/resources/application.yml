spring:
  application:
    name: lwx-ai-agent
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agentdb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            schema: classpath:org/springframework/ai/chat/memory/repository/jdbc/schema-mysql.sql
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json

    # OpenAI 兼容接口（支持 OpenAI / 任何 OpenAI 格式 API）
#    openai:
#      api-key: ${OPENAI_API_KEY:}
#      chat:
#        options:
#          model: gpt-4o

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms

# 自定义 PostgreSQL 配置（给 pgvector 用）
# 默认聊天模型：deepseek（默认）| openai
# 想切换 OpenAI 时改成 openai，并设置 spring.ai.openai.api-key
app:
  chat:
    provider: deepseek
  pgvector:
    datasource:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5432/postgres
      username: postgres
      password: ${PGVECTOR_PASSWORD:}
  rate-limit:
    enabled: true
    daily-quota: 5

server:
  port: 8088
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.lwx.lwxaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug

# 检索模式切换：pgvector（默认）| hybrid
rag:
  type: hybrid
  hybrid:
    es:
      uris: http://172.28.23.117:9200
      index: love_knowledge
    milvus:
      host: 172.28.23.117
      port: 19530
      collection-name: love_knowledge
      vector-dim: 1024
    rrf:
      k: 60
      topK: 10

evolution:
  enabled: true
  idle-timeout-seconds: 300
  quality-threshold: 5
  extract-delay-seconds: 30

search-api:
  api-key: ${SEARCH_API_KEY:}

# MyBatis-Plus 配置（使用已有 MySQL 数据源）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 配置（第二期：多租户）
jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000  # 24 小时
