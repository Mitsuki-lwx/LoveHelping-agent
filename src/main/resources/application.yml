spring:
  application:
    name: lwx-ai-agent
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agentdb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            schema: classpath:org/springframework/ai/chat/memory/repository/jdbc/schema-mysql.sql
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
# 自定义 PostgreSQL 配置（给 pgvector 用）
app:
  pgvector:
    datasource:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5432/postgres
      username: postgres
      password: 123456

server:
  port: 8088
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.lwx.lwxaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug

# 检索模式切换：pgvector（默认）| hybrid
rag:
  type: hybrid
  hybrid:
    es:
      uris: http://172.28.23.117:9200
      index: love_knowledge
    milvus:
      host: 172.28.23.117
      port: 19530
      collection-name: love_knowledge
      vector-dim: 1024
    rrf:
      k: 60
      topK: 10

search-api:
  api-key: b0236c51e1233e79e3c703aa360ef5a949f97c24

# MyBatis-Plus 配置（使用已有 MySQL 数据源）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 配置（第二期：多租户）
jwt:
  secret: lwx-ai-agent-secret-key-need-at-least-32-chars
  expiration-ms: 86400000  # 24 小时
